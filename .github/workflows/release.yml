name: Release Packages

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to attach packages to (e.g. v2.0.0). Leave empty to use current ref.'
        required: false
        type: string

jobs:
  build-ubuntu:
    uses: ./.github/workflows/build-package.yml
    with:
      distro: ubuntu
      docker_image: ubuntu:25.04
      pkg_manager: apt
      cpack_gen: DEB
      runner: ubuntu-latest
      arch: amd64

  build-fedora:
    uses: ./.github/workflows/build-package.yml
    with:
      distro: fedora
      docker_image: fedora:42
      pkg_manager: dnf
      cpack_gen: RPM
      runner: ubuntu-latest
      arch: amd64

  build-opensuse:
    uses: ./.github/workflows/build-package.yml
    with:
      distro: opensuse
      docker_image: opensuse/tumbleweed
      pkg_manager: zypper
      cpack_gen: RPM
      runner: ubuntu-latest
      arch: amd64

  build-ubuntu-arm64:
    uses: ./.github/workflows/build-package.yml
    with:
      distro: ubuntu
      docker_image: ubuntu:25.04
      pkg_manager: apt
      cpack_gen: DEB
      runner: ubuntu-24.04-arm
      arch: arm64

  build-fedora-arm64:
    uses: ./.github/workflows/build-package.yml
    with:
      distro: fedora
      docker_image: fedora:42
      pkg_manager: dnf
      cpack_gen: RPM
      runner: ubuntu-24.04-arm
      arch: arm64

  build-opensuse-arm64:
    uses: ./.github/workflows/build-package.yml
    with:
      distro: opensuse
      docker_image: opensuse/tumbleweed
      pkg_manager: zypper
      cpack_gen: RPM
      runner: ubuntu-24.04-arm
      arch: arm64

  validate-ubuntu:
    needs: build-ubuntu
    uses: ./.github/workflows/validate-package.yml
    with:
      distro: ubuntu
      docker_image: ubuntu:25.04
      pkg_manager: apt
      runner: ubuntu-latest
      arch: amd64

  validate-fedora:
    needs: build-fedora
    uses: ./.github/workflows/validate-package.yml
    with:
      distro: fedora
      docker_image: fedora:42
      pkg_manager: dnf
      runner: ubuntu-latest
      arch: amd64

  validate-opensuse:
    needs: build-opensuse
    uses: ./.github/workflows/validate-package.yml
    with:
      distro: opensuse
      docker_image: opensuse/tumbleweed
      pkg_manager: zypper
      runner: ubuntu-latest
      arch: amd64

  validate-ubuntu-arm64:
    needs: build-ubuntu-arm64
    uses: ./.github/workflows/validate-package.yml
    with:
      distro: ubuntu
      docker_image: ubuntu:25.04
      pkg_manager: apt
      runner: ubuntu-24.04-arm
      arch: arm64

  validate-fedora-arm64:
    needs: build-fedora-arm64
    uses: ./.github/workflows/validate-package.yml
    with:
      distro: fedora
      docker_image: fedora:42
      pkg_manager: dnf
      runner: ubuntu-24.04-arm
      arch: arm64

  validate-opensuse-arm64:
    needs: build-opensuse-arm64
    uses: ./.github/workflows/validate-package.yml
    with:
      distro: opensuse
      docker_image: opensuse/tumbleweed
      pkg_manager: zypper
      runner: ubuntu-24.04-arm
      arch: arm64

  release:
    needs: [validate-ubuntu, validate-fedora, validate-opensuse, validate-ubuntu-arm64, validate-fedora-arm64, validate-opensuse-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag name
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.ref_name }}"
          fi
          # If still not a version tag (e.g. triggered manually on a branch), use latest git tag
          if [[ "$TAG" != v*.*.* ]]; then
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          fi
          if [ -z "$TAG" ]; then
            echo "ERROR: No version tag found. Pass a tag input (e.g. v2.0.0) when using workflow_dispatch." >&2
            exit 1
          fi
          echo "name=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: packages/
          merge-multiple: true

      - name: List downloaded packages
        run: find packages/ -type f

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          files: packages/*
          fail_on_unmatched_files: true
